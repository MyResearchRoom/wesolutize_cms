name: Deploy to AWS EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Deploy to EC2
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          PEM_KEY: ${{ secrets.SERVER_KEY }}
        run: |
          echo "$PEM_KEY" > ec2-key.pem
          chmod 600 ec2-key.pem

          echo "Deploying to EC2..."
          rsync -avz -e "ssh -i ec2-key.pem -o StrictHostKeyChecking=no" --exclude node_modules ./ ubuntu@$HOST:/home/ubuntu/app/

          ssh -i ec2-key.pem -o StrictHostKeyChecking=no ubuntu@$HOST << 'EOF'
            cd /home/ubuntu/app
            npm install
            pm2 stop all || true
            pm2 start server.js --name "my-node-app"
          EOF
